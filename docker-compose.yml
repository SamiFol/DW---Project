services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build: .
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URI: "mongodb://mongo:27017"
      MONGO_DB: "acme_dwh"
    ports:
      - "8000:8000"

  # Optional: a web UI to *see* the append-only documents during the demo.
  mongo-express:
    image: mongo-express:1.0.2
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      ME_CONFIG_MONGODB_URL: "mongodb://mongo:27017"
      ME_CONFIG_BASICAUTH: "false"
    ports:
      - "8081:8081"

volumes:
  mongo_data:
